name: Release
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          rustflags: ''
          cache: false
      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            src-tauri/target
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ matrix.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}

      - name: Install system deps (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libxdo-dev libasound2-dev

      - name: Install npm dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Build Tauri app
        run: npm run tauri build ${{ matrix.os == 'macos-latest' && '-- --bundles dmg,app' || '' }}

      - name: Create macOS zip (fallback)
        if: matrix.os == 'macos-latest'
        run: |
          cd src-tauri/target/release/bundle/macos 2>/dev/null || true
          zip -r ClickyX.app.zip ClickyX.app 2>/dev/null || true
          mv ClickyX.app.zip ../dmg/ 2>/dev/null || true

      - name: Sign Windows artifacts
        if: matrix.os == 'windows-latest' && env.SIGNING_CERT != ''
        env:
          SIGNING_CERT: ${{ secrets.WINDOWS_SIGNING_CERT }}
          SIGNING_PASSWORD: ${{ secrets.WINDOWS_SIGNING_PASSWORD }}
        shell: pwsh
        run: |
          # Import cert
          $certBytes = [Convert]::FromBase64String($env:SIGNING_CERT)
          $certPath = "$env:TEMP\signing.pfx"
          [IO.File]::WriteAllBytes($certPath, $certBytes)
          # Sign all .msi and .exe files
          Get-ChildItem -Path "src-tauri/target/release/bundle" -Recurse -Include "*.msi","*.exe" | ForEach-Object {
            & signtool sign /f $certPath /p $env:SIGNING_PASSWORD /tr http://timestamp.digicert.com /td sha256 /fd sha256 $_.FullName
          }
          Remove-Item $certPath -Force

      - name: Sign (macOS)
        if: matrix.os == 'macos-latest'
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_NOTARIZATION_USERNAME: ${{ secrets.APPLE_NOTARIZATION_USERNAME }}
          APPLE_NOTARIZATION_PASSWORD: ${{ secrets.APPLE_NOTARIZATION_PASSWORD }}
        run: |
          if [ -n "$APPLE_SIGNING_IDENTITY" ]; then
            bash scripts/sign-macos.sh "$APPLE_SIGNING_IDENTITY"
            bash scripts/notarize-macos.sh "$APPLE_NOTARIZATION_USERNAME" "$APPLE_NOTARIZATION_PASSWORD"
          else
            echo "No signing identity available, skipping sign"
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: clickyx-${{ matrix.os }}
          path: src-tauri/target/release/bundle/

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Check if pre-release tag
        id: check
        run: |
          TAG="${{ github.ref_name }}"
          if echo "$TAG" | grep -Eq '\-(alpha|beta|rc|pre|dev|test)'; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install git-cliff
        uses: taiki-e/install-action@v2
        with:
          tool: git-cliff

      - name: Generate changelog
        id: changelog
        run: |
          git cliff --unreleased --tag "${{ github.ref_name }}" --output CHANGELOG.md 2>/dev/null || true
          if [ ! -f CHANGELOG.md ] || [ ! -s CHANGELOG.md ]; then
            echo "## What's Changed" > CHANGELOG.md
          fi

      - name: Generate release notes
        id: notes
        run: |
          cat CHANGELOG.md > release-notes.md
          echo "" >> release-notes.md
          echo "### Downloads" >> release-notes.md
          echo "" >> release-notes.md
          find artifacts -type f \( -name "*.msi" -o -name "*.exe" -o -name "*.dmg" -o -name "*.zip" -o -name "*.AppImage" -o -name "*.deb" -o -name "*.rpm" \) | while read f; do
            basename=$(basename "$f")
            echo "- $basename" >> release-notes.md
          done

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ClickyX ${{ github.ref_name }}
          body_path: release-notes.md
          draft: true
          prerelease: ${{ steps.check.outputs.prerelease }}
          files: |
            artifacts/**/*.msi
            artifacts/**/*.exe
            artifacts/**/*.dmg
            artifacts/**/*.zip
            artifacts/**/*.AppImage
            artifacts/**/*.deb
            artifacts/**/*.rpm
