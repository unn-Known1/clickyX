name: Flatpak Build
on:
  workflow_dispatch:
  push:
    tags: ["v*"]

jobs:
  flatpak:
    runs-on: ubuntu-latest
    container:
      image: bilelmoussaoui/flatpak-github-actions:gnome-47
      options: --privileged
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          cache: false

      - name: Install system deps for Rust build
        run: |
          apt-get update -y
          apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev \
            patchelf libxdo-dev libasound2-dev libayatana-appindicator3-dev

      - name: Install npm dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Build Rust binary (outside Flatpak)
        working-directory: src-tauri
        run: cargo build --release

      - name: Build Flatpak
        uses: bilelmoussaoui/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: clickyx.flatpak
          manifest-path: flatpak/com.clickyx.ClickyX.yml
          cache-key: flatpak-builder-${{ github.sha }}
