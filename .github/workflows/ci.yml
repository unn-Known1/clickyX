name: CI/CD
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          cache: false
      - name: Cache Rust dependencies
        uses: actions/cache@v5
        with:
          path: |
            src-tauri/target
            ~/.cargo/registry
            ~/.cargo/git
          key: ubuntu-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
      - name: Install system deps (Linux)
        run: |
          sudo apt-get update -y
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libxdo-dev libasound2-dev
      - name: Install npm dependencies
        run: npm ci
      - name: Build frontend
        run: npm run build
      - name: Check Rust compilation
        working-directory: src-tauri
        run: cargo check
      - name: Run Rust tests
        working-directory: src-tauri
        run: cargo test --all-features
      - name: Lint
        run: cargo clippy -- -D warnings 2>/dev/null || true

  build:
    name: Build (${{ matrix.os }})
    needs: check
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          rustflags: ''
          cache: false
      - name: Cache Rust dependencies
        uses: actions/cache@v5
        with:
          path: |
            src-tauri/target
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ matrix.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}

      - name: Install system deps (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libxdo-dev libasound2-dev

      - name: Install npm dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Build Tauri app
        run: npm run tauri build ${{ matrix.os == 'macos-latest' && '-- --bundles dmg,app' || '' }}

      - name: Create macOS zip (fallback)
        if: matrix.os == 'macos-latest'
        run: |
          cd src-tauri/target/release/bundle/macos 2>/dev/null || true
          zip -r ClickyX.app.zip ClickyX.app 2>/dev/null || true
          mv ClickyX.app.zip ../dmg/ 2>/dev/null || true

      - name: Upload artifacts (Linux)
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v6
        with:
          name: clickyx-linux
          path: src-tauri/target/release/bundle/

      - name: Upload artifacts (Windows)
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v6
        with:
          name: clickyx-windows
          path: src-tauri/target/release/bundle/

      - name: Upload artifacts (macOS)
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v6
        with:
          name: clickyx-macos
          path: src-tauri/target/release/bundle/
