app-id: com.clickyx.ClickyX
runtime: org.gnome.Platform
runtime-version: '47'
sdk: org.gnome.Sdk
command: clickyx
finish-args:
  - --share=network
  - --share=ipc
  - --socket=wayland
  - --socket=fallback-x11
  - --socket=pulseaudio
  - --device=all
  - --filesystem=xdg-config
  - --filesystem=xdg-data
  - --talk-name=org.freedesktop.portal.Desktop
  - --talk-name=org.freedesktop.portal.ScreenCast
  - --talk-name=org.freedesktop.portal.RemoteDesktop
  - --talk-name=org.freedesktop.Notifications
  - --talk-name=org.a11y.Bus
modules:
  - name: clickyx
    buildsystem: simple
    build-commands:
      - install -Dm755 clickyx /app/bin/clickyx
    sources:
      - type: file
        path: ../src-tauri/target/release/clickyx
        dest-filename: clickyx
